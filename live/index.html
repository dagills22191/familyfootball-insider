<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="15">
<title>FamilyFootball Insider — Draft Desk LIVE</title>
<style>
:root{--bg:#101418;--panel:#1a2027;--ink:#e8e4d8;--dim:#8a94a0;
--anchor:#d8b24a;--homer:#4ac2d8;--live:#d84a4a}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--ink);
font:16px/1.5 Georgia,'Times New Roman',serif;padding:0 0 3rem}
.wrap{max-width:680px;margin:0 auto;padding:0 1rem}
header{padding:1.2rem 1rem;border-bottom:3px double var(--anchor);text-align:center}
header h1{font-size:1.3rem;letter-spacing:.12em;text-transform:uppercase}
header .live{color:var(--live);font-weight:bold;letter-spacing:.2em}
.banner{background:var(--panel);border-left:4px solid var(--anchor);
margin:1rem 0;padding:.8rem 1rem}
.banner b{font-size:1.15rem}
.paused{opacity:.75;border-left-color:var(--dim)}
.ticker{display:flex;gap:.6rem;overflow-x:auto;padding:.4rem 0;margin-bottom:1rem}
.tick{background:var(--panel);border-radius:4px;padding:.35rem .6rem;
white-space:nowrap;font-size:.82rem;color:var(--dim)}
.tick b{color:var(--ink)}
.entry{background:var(--panel);border-radius:6px;margin:.6rem 0;padding:.7rem .9rem}
.entry .spk{display:block;font-size:.75rem;letter-spacing:.14em;
text-transform:uppercase;margin-bottom:.2rem}
.spk-anchor .spk{color:var(--anchor)}
.spk-homer .spk{color:var(--homer)}
.spk-guest .spk{color:var(--dim)}
.spk-homer{border-left:3px solid var(--homer)}
.spk-anchor{border-left:3px solid var(--anchor)}
.pickref{color:var(--dim);font-size:.78rem;float:right}
.foot{color:var(--dim);font-size:.78rem;text-align:center;margin-top:1.6rem}
.hype{text-align:center;padding:3rem 1rem}
.hype h2{font-size:1.5rem;margin-bottom:.6rem}
</style>
</head>
<body>
<header><span class="live">● LIVE</span>
<h1>FamilyFootball Draft Desk</h1></header>
<div class="wrap">
<div class="banner"><span class="pickref">Round 1, Pick 1</span><b>Team 1</b> on the clock — Pick 1</div>
<div class="foot">updated 21:58:30 · FamilyFootball Insider ·
<a href="../" style="color:inherit">the Insider</a></div>
</div>
</body>
</html>
